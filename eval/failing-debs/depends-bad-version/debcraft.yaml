name: depends-test
version: "1.0"
summary: Package with incorrect depends syntax
description: |
  Debian dependencies use specific version operators like (>= 1.0), (<< 2.0).
  Using pip/npm style operators like >=1.0 or ^1.0 will fail.

maintainer: Test User <test@example.com>

packages:
  depends-test:
    depends:
      - "libc6>=2.17"
      - "python3^3.8"

parts:
  my-app:
    plugin: nil
    source: .
