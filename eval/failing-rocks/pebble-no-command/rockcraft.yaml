name: pebble-no-command
version: "1.0"
summary: Rock with a pebble service missing the command field
description: |
  This rock defines a service but forgets the required 'command' field.

base: ubuntu@24.04

platforms:
  amd64:

services:
  my-service:
    override: replace
    startup: enabled
    # missing: command: /usr/bin/myapp

parts:
  my-part:
    plugin: nil
