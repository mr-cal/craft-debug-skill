name: craftctl-build-failure
base: core22
version: "0.1"
summary: Run a custom override-build scriptlet
description: |
  Demonstrates the use of craftctl in an override-build scriptlet.

grade: devel
confinement: strict

parts:
  my-part:
    plugin: go
    source: .
    override-build: |
      craftctl set-version && echo "should have failed set-version"
      craftctl default && echo "should have failed build"
